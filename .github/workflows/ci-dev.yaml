name: CI & Dev CD Pipeline

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Required for GCP Workload Identity Federation (OIDC)

env:
  SERVICE_NAME: qwintly
  REGION: us-central1
  GAR_REPOSITORY: qwintly-repo

jobs:
  # 1. Validation and Security Auditing
  validate:
    name: Lint, Audit & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Type Check (TypeScript)
        run: npx tsc --noEmit

      - name: Dependency Vulnerability Audit
        run: npm audit --audit-level=high

  # 2. SonarCloud Analysis
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # 3. Development Continuous Deployment (Triggers ONLY on push to dev branch)
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [validate, sonarcloud]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # By default, authenticate using GCP Service Account Key for compatibility.
      # To switch to Workload Identity Federation (OIDC):
      # 1. Comment out 'credentials_json' line.
      # 2. Uncomment 'workload_identity_provider' and 'service_account' lines.
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          # workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          # service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure Docker auth
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build container
        run: |
          SUPABASE_URL="${{ vars.NEXT_PUBLIC_SUPABASE_URL }}"
          SUPABASE_PUBLISHABLE_KEY="${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}"

          echo "::add-mask::$SUPABASE_URL"
          echo "::add-mask::$SUPABASE_PUBLISHABLE_KEY"
          echo "::add-mask::${{ vars.NEXT_PUBLIC_GA_ID }}"

          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="$SUPABASE_URL" \
            --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY="$SUPABASE_PUBLISHABLE_KEY" \
            --build-arg NEXT_PUBLIC_GA_ID="${{ vars.NEXT_PUBLIC_GA_ID }}" \
            --build-arg NEXT_PUBLIC_SITE_URL="${{ vars.NEXT_PUBLIC_SITE_URL }}" \
            --build-arg NEXT_PUBLIC_PREVIEW_URL_SUFFIX="${{ vars.NEXT_PUBLIC_PREVIEW_URL_SUFFIX }}" \
            --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY="${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}" \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .

      - name: Push container
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run (Dev)
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --service-account=${{ secrets.RUNTIME_SERVICE_ACCOUNT }} \
            --allow-unauthenticated \
            --set-env-vars=NEXT_PUBLIC_GA_ID=${{ vars.NEXT_PUBLIC_GA_ID }},NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }},NEXT_PUBLIC_SUPABASE_URL=${{vars.NEXT_PUBLIC_SUPABASE_URL}},NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}},UPSTASH_REDIS_REST_URL_GEN_EVENTS=${{vars.UPSTASH_REDIS_REST_URL_GEN_EVENTS}},PUBSUB_TOPIC_WEB_GEN=${{vars.PUBSUB_TOPIC_WEB_GEN}},PUBSUB_TOPIC_WEB_DEPLOY=${{vars.PUBSUB_TOPIC_WEB_DEPLOY}},GCP_PROJECT_ID=${{vars.GCP_PROJECT_ID}},PREVIEW_URL_SUFFIX=${{ vars.NEXT_PUBLIC_PREVIEW_URL_SUFFIX }},NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }} \
            --set-secrets=GEMINI_API_KEY=gemini-api-key:latest,UPSTASH_REDIS_REST_TOKEN_GEN_EVENTS=upstash-redis-rest-token-gen-events:latest,WORKER_PUBLISH_SECRET=publish-secret:latest
